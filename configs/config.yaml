# BarBeR-Project Configuration File

# Dataset paths
data:
  raw_path: "data/raw/"
  annotations_path: "data/raw/Annotations/VIA/"
  dataset_path: "data/raw/dataset/"
  images_path: "data/raw/dataset/images/"
  labels_path: "data/raw/dataset/labels/"

# Data splits
splits:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42

# Training parameters
training:
  batch_size: 32
  num_epochs: 10
  learning_rate: 0.001
  weight_decay: 0.0005
  device: "cpu"  # or "cuda" if GPU available
  num_workers: 0

# Model architectures
models:
  classification:
    name: "BasicCNN"
    input_size: 224
    num_classes: 2
    dropout: 0.5
    
  detection:
    name: "YOLOv8n"
    image_size: 640
    batch_size: 16
    epochs: 10
    pretrained: true

# Data augmentation
augmentation:
  resize: 224
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

# Evaluation
evaluation:
  metrics: ["accuracy", "precision", "recall", "f1", "mAP"]
  iou_thresholds: [0.5, 0.75]

# Output paths
outputs:
  experiments: "experiments/"
  figures: "outputs/figures/"
  reports: "outputs/reports/"
  checkpoints: "experiments/{model_name}/checkpoints/"
  logs: "experiments/{model_name}/logs/"